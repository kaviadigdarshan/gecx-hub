[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    unit: pure unit tests, no I/O
    integration: tests that call FastAPI endpoints
    contract: Schemathesis schema tests
    slow: tests taking >2s
