services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: ./frontend/.env.local
    volumes:
      - ./frontend/src:/app/src

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./backend:/app
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/local-sa-key.json
